version: '3.8'

services:

  # ============================================================
  # POSTGRESQL SERVICE (With Multi-DB initialization)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: microservices-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: maindb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount initialization script to bootstrap userdb and orderdb automatically
      - ./init-scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maindb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # REDIS SERVICE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: microservices-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  # ============================================================
  # KAFKA MESSAGE BROKER (KRaft Mode)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: microservices-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - app-network

  # ============================================================
  # USER SERVICE (Port 8081)
  # ============================================================
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: microservices-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - app-network

  # ============================================================
  # ORDER SERVICE (Port 8082)
  # ============================================================
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: microservices-order
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - app-network

  # ============================================================
  # API GATEWAY (Port 9000)
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: microservices-gateway
    ports:
      - "9000:9000"
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      order-service:
        condition: service_started
    environment:
      USER_SERVICE_URI: http://user-service:8081
      ORDER_SERVICE_URI: http://order-service:8082
    networks:
      - app-network

volumes:
  pgdata:
    name: microservices-pgdata

networks:
  app-network:
    name: microservices-network
    driver: bridge
