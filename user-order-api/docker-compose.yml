version: '3.8'

services:

  # ============================================================
  # POSTGRESQL DATABASE SERVICE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: userorder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: userorderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userorderdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # SPRING BOOT REST API SERVICE
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: userorder-api
    ports:
      - "8080:8080" # Map host port 8080 to container port 8080
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy # Wait for database health check to pass
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      # Override application.yml datasource configurations dynamically
      # We use the service name "postgres" as the hostname
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userorderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - app-network

  # ============================================================
  # REDIS CACHE SERVICE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: userorder-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network

  # ============================================================
  # APACHE KAFKA MESSAGE BROKER SERVICE (KRaft Mode)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: userorder-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - app-network

  # ============================================================
  # PGADMIN DATABASE MANAGEMENT UI
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: userorder-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@learning.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:
    name: userorder-pgdata

networks:
  app-network:
    name: userorder-network
    driver: bridge
